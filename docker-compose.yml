version: '3.8'

services:
  couchbase-node1:
    image: couchbase/server:community-7.6.0
    container_name: couchbase-node1
    ports:
      - "8091:8091"
      - "8093:8093"
      - "11210:11210"
    environment:
      - CLUSTER_NAME=demo-cluster
    networks:
      - couchbase-net
    volumes:
      - cb-node1-data:/opt/couchbase/var

  couchbase-node2:
    image: couchbase/server:community-7.6.0
    container_name: couchbase-node2
    networks:
      - couchbase-net
    volumes:
      - cb-node2-data:/opt/couchbase/var

  couchbase-node3:
    image: couchbase/server:community-7.6.0
    container_name: couchbase-node3
    networks:
      - couchbase-net
    volumes:
      - cb-node3-data:/opt/couchbase/var

  couchbase-init:
    image: curlimages/curl:latest
    container_name: couchbase-init
    depends_on:
      - couchbase-node1
      - couchbase-node2
      - couchbase-node3
    volumes:
      - ./couchbase-init.sh:/init.sh
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - couchbase-net

  spring-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: spring-app
    ports:
      - "8080:8080"
    environment:
      - COUCHBASE_HOST=couchbase-node1
      - COUCHBASE_USERNAME=Administrator
      - COUCHBASE_PASSWORD=password
      - COUCHBASE_BUCKET=demo
    depends_on:
      couchbase-init:
        condition: service_completed_successfully
    networks:
      - couchbase-net

networks:
  couchbase-net:
    driver: bridge

volumes:
  cb-node1-data:
  cb-node2-data:
  cb-node3-data:
